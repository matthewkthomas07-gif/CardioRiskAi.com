# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cardioriskai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ORIGINS
        value: https://cardioriskai.com,https://www.cardioriskai.com
